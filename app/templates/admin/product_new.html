{% extends "layouts/base.html" %}
{% block title %}Nouveau produit{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="mb-3">Ajouter un produit</h3>

        <form method="post" action="/admin/products/new">
          <div class="mb-3">
            <label class="form-label">Nom</label>
            <input class="form-control" name="name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Prix (MAD)</label>
            <input class="form-control" name="price" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input class="form-control" name="stock" value="0">
          </div>

          <button class="btn btn-success w-100" type="submit">Ajouter</button>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
